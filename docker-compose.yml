x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pb-postgres
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: policybazar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Welcome@2026
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d policybazar"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: pb-redis
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pb-backend
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEBUG: "False"
      DATABASE_URL: "postgresql+asyncpg://postgres:Welcome%402026@postgres:5432/policybazar"
      REDIS_URL: "redis://redis:6379"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      JWT_SECRET: rFMvew5xAHYzgoc2CYwW_9UEdilSVmpwe865pmWm9IM
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      RAZORPAY_KEY_ID: rzp_test_Sg7NyDbQlDo4eI
